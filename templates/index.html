<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>{{ name }} | Portfolio</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- CSS riêng của project -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>

  <body>
    <main class="container min-vh-100 d-flex align-items-center">
      <section class="hero-section">
        <p class="text-primary fw-semibold mb-2">Xin chào, tôi là</p>

        <h1 class="display-3 fw-bold">{{ name }}</h1>

        <h2 class="h3 text-secondary mb-4">{{ role }}</h2>

        <p class="lead hero-description">
          Tôi xây dựng các ứng dụng web bằng Python, Flask, HTML, CSS và
          JavaScript.
        </p>

        <div class="d-flex gap-3 mt-4">
          <a href="#projects" class="btn btn-primary btn-lg"> Xem dự án </a>

          <button
            type="button"
            id="contactButton"
            class="btn btn-outline-dark btn-lg"
          >
            Liên hệ
          </button>
        </div>

        <p id="contactMessage" class="mt-3 fw-semibold"></p>
      </section>
    </main>

    <!-- JavaScript riêng của project -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
