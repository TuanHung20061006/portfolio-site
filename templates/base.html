<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta name="description" content="Portfolio cá nhân của {{ name }}" />

    <title>{% block title %} {{ name }} | Portfolio {% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- CSS riêng -->
    <link
      rel="stylesheet"
      href="/css/style.css"
    />
  </head>

  <body id="home">
    <!-- Navbar -->
    <nav
      class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top"
      aria-label="Điều hướng chính"
    >
      <div class="container">
        <a class="navbar-brand fw-bold" href="#home"> {{ name }} </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavbar"
          aria-controls="mainNavbar"
          aria-expanded="false"
          aria-label="Mở menu điều hướng"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="#home"> Trang chủ </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#about"> Giới thiệu </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#skills"> Kỹ năng </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#projects"> Dự án </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#contact"> Liên hệ </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Nội dung của từng trang -->
    <main>{% block content %} {% endblock %}</main>

    <!-- Footer -->
    <footer class="footer bg-dark text-white py-4">
      <div
        class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-3"
      >
        <p class="mb-0">
          © {{ current_year }} {{ name }}. All rights reserved.
        </p>

        <a href="#home" class="btn btn-outline-light btn-sm">
          Quay lại đầu trang
        </a>
      </div>
    </footer>

    <!-- Bootstrap JavaScript Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript riêng -->
    <script src="/js/main.js"></script>
  </body>
</html>
